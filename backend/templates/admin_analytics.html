<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Assistify Admin Analytics Dashboard</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Segoe+UI:400,700&display=swap">
  <style>
    :root {
      --accent: #10a37f;
      --bg: #1e1e1e;
      --sidebar: #2b2b2b;
      --light: #fff;
    }
    body {
      background: #1e1e1e;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* Header and Menu Styles */
    header {
      background: var(--sidebar);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 998;
    }
    .menu-btn {
      background: var(--accent);
      color: var(--light);
      border: none;
      font-size: 24px;
      width: 48px;
      height: 48px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .menu-btn:hover {
      background: #0e8c6d;
    }
    .header-title {
      font-size: 1.5rem;
      margin: 0;
      color: var(--accent);
    }
    .header-spacer {
      width: 72px;
    }
    .nav-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      z-index: 999;
    }
    .nav-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    .nav-menu {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: var(--sidebar);
      box-shadow: 2px 0 16px rgba(0,0,0,0.5);
      transition: left 0.3s;
      z-index: 1000;
      overflow-y: auto;
    }
    .nav-menu.open {
      left: 0;
    }
    .nav-header {
      padding: 24px;
      border-bottom: 1px solid #3a3a3a;
    }
    .nav-header h2 {
      margin: 0;
      color: var(--accent);
      font-size: 1.5rem;
    }
    .nav-links {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .nav-links li {
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .nav-link {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      color: var(--light);
      text-decoration: none;
      transition: background 0.3s;
    }
    .nav-link:hover {
      background: rgba(16,163,127,0.2);
    }
    .nav-link svg {
      width: 20px;
      height: 20px;
      margin-right: 12px;
    }
    .content-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 5vh 0;
    }
    h1 {
      color: #10a37f;
      margin-top: 2rem;
      font-size: 2rem;
    }
    .dashboard-section {
      background: #232323;
      border-radius: 12px;
      box-shadow: 0 0 5px #111;
      padding: 2rem;
      max-width: 800px;
      width: 100%;
      margin: 2rem 0 1.5rem 0;
    }
    canvas {
      background: #252525;
      border-radius: 8px;
      margin-bottom: 2rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #252525;
      color: #fff;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 1rem;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
      text-align: center;
    }
    th {
      color: #10a37f;
      background: #232323;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .error-table {
      margin-top: 2rem;
    }
    .error-row {
      color: #ff7979;
    }
    .success {
      color: #10a37f;
    }
    #refresh-btn {
      background: #10a37f;
      color: #fff;
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #refresh-btn:hover {
      background: #0d8658;
    }
    .note {
      color: #9ca3af;
      margin-bottom: 2rem;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="nav-overlay" onclick="closeNav()"></div>
  
  <!-- Side Navigation Menu -->
  <nav class="nav-menu">
    <div class="nav-header">
      <h2>Menu</h2>
    </div>
    <ul class="nav-links">
      <li>
        <a href="http://127.0.0.1:7001/admin" class="nav-link">
          <svg fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
          Dashboard
        </a>
      </li>
      <li>
        <a href="http://127.0.0.1:7001/admin/users" class="nav-link">
          <svg fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
          Users
        </a>
      </li>
      <li>
        <a href="http://127.0.0.1:7001/admin/knowledge" class="nav-link">
          <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/></svg>
          Knowledge Base
        </a>
      </li>
      <li>
        <a href="/admin/analytics" class="nav-link">
          <svg fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
          Analytics
        </a>
      </li>
      <li>
        <a href="/admin/errors" class="nav-link">

      <li>

          <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
          Profile Settings
        </a>
      </li>
      <li>
        <a href="http://127.0.0.1:7001/frontend/index.html" class="nav-link">
          <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/></svg>
          Chat
        </a>
      </li>
      <li>
        <a href="http://127.0.0.1:7001/logout" class="nav-link">
          <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
          Logout
        </a>
      </li>
    </ul>
  </nav>

  <!-- Header with hamburger button -->
  <header>
    <button class="menu-btn" onclick="openNav()">☰</button>
    <h1 class="header-title">Assistify Admin</h1>
    <div class="header-spacer"></div>
  </header>

  <div class="content-wrapper">

<h1>Assistify Admin Analytics</h1>
<div class="note">Only admins can view this dashboard.</div>

<div class="dashboard-section">
  <button id="refresh-btn">Refresh Analytics</button>
  <canvas id="roleChart" height="80"></canvas>
  <div id="summaryTableDiv"></div>
</div>

<div class="dashboard-section">
  <h2 style="color:#ff7979;">Recent Errors</h2>
  <table id="errorTable" class="error-table">
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>User</th>
        <th>Error Message</th>
      </tr>
    </thead>
    <tbody id="errorTableBody">
      <tr><td colspan="3">No errors logged.</td></tr>
    </tbody>
  </table>
</div>

<script>
async function fetchAnalytics() {
  // Use relative endpoints so this works regardless of host/port
  const summaryRes = await fetch(`/analytics/summary`, { credentials: 'same-origin' });
  const summaryData = await summaryRes.json();
  const errorsRes = await fetch(`/analytics/errors`, { credentials: 'same-origin' });
  const errorsData = await errorsRes.json();

  return {
    summary: summaryData.summary,
    errors: errorsData.errors
  };
}

function updateRoleChart(summary) {
  const ctx = document.getElementById("roleChart").getContext('2d');
  const roles = summary.map(r => r[0]);
  const counts = summary.map(r => r[1]);

  if (window.roleChartInstance) window.roleChartInstance.destroy();
  window.roleChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: roles,
      datasets: [{
        label: "Queries per Role",
        data: counts,
        backgroundColor: "#10a37f",
        borderRadius: 5
      }]
    },
    options: {
      scales: {
        y: { beginAtZero: true },
        x: { ticks: { color: "#fff" } }
      },
      plugins: { legend: { display: false } },
      responsive: true
    }
  });
}

function updateSummaryTable(summary) {
  let html = `<table><thead>
    <tr><th>User Role</th><th>Query Count</th></tr></thead><tbody>`;
  for (const row of summary) {
    html += `<tr><td>${row[0]}</td><td class="success">${row[1]}</td></tr>`;
  }
  html += "</tbody></table>";
  document.getElementById("summaryTableDiv").innerHTML = html;
}

function updateErrorTable(errors) {
  const body = document.getElementById("errorTableBody");
  if (!errors.length) {
    body.innerHTML = `<tr><td colspan="3">No errors logged.</td></tr>`;
    return;
  }
  let rows = "";
  for (const err of errors) {
    rows += `<tr class="error-row">
      <td>${err[0]}</td>
      <td>${err[1]}</td>
      <td>${err[2]}</td>
    </tr>`;
  }
  body.innerHTML = rows;
}

async function refreshAnalytics() {
  try {
    document.getElementById("refresh-btn").textContent = "Refreshing...";
    const data = await fetchAnalytics();
    updateRoleChart(data.summary);
    updateSummaryTable(data.summary);
    updateErrorTable(data.errors);
  } catch (err) {
    alert("Error loading analytics: " + err);
  } finally {
    document.getElementById("refresh-btn").textContent = "Refresh Analytics";
  }
}

document.getElementById("refresh-btn").onclick = refreshAnalytics;

// Logout helper
function gotoLogout() {
  window.location.href = "/logout";
}

refreshAnalytics(); // Load on page
</script>
<script>
function openNav() {
  document.querySelector('.nav-menu').classList.add('open');
  document.querySelector('.nav-overlay').classList.add('show');
}

function closeNav() {
  document.querySelector('.nav-menu').classList.remove('open');
  document.querySelector('.nav-overlay').classList.remove('show');
}
</script>

</body>
</html>
