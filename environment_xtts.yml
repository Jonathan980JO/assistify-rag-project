name: assistify_xtts
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10

  # PyTorch 2.1.2 with CUDA 11.8 — officially recommended for TTS 0.22.0 / XTTS v2
  # This is the exact stack where no patches are needed:
  #   - transformers 4.x still has BeamSearchScorer, GenerationMixin in PreTrainedModel
  #   - torch.load weights_only default is still False in 2.1.x
  - pytorch::pytorch=2.1.2
  - pytorch::torchvision=0.16.2
  - pytorch::torchaudio=2.1.2
  - pytorch::pytorch-cuda=11.8

  - pip:
    # TTS (Coqui XTTS v2)
    - TTS==0.22.0

    # HuggingFace — must stay on 4.x to avoid breaking changes that affect TTS 0.22.0
    - transformers==4.40.2
    - tokenizers==0.19.1
    - huggingface-hub==0.22.2

    # FastAPI microservice
    - fastapi==0.115.12
    - uvicorn[standard]==0.34.2
    - pydantic==2.10.6

    # Audio
    - soundfile==0.12.1
    - scipy==1.13.1
    - numpy==1.26.4

    # Utils
    - requests==2.32.3
    - python-dotenv==1.0.1
