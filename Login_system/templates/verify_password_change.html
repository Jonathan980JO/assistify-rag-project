<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <meta name="csrf-token" content="{{ csrf_token() }}">
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Password Change - Assistify</title>
    <style>
        :root {
            --accent: #10a37f;
            --bg: #232323;
            --sidebar: #2b2b2b;
            --light: #fff;
            --muted: #9ca3af;
            --danger: #ff7979;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .box {
            background: var(--sidebar);
            border-radius: 16px;
            padding: 48px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 0 24px rgba(0, 0, 0, 0.5);
        }
        h2 {
            text-align: center;
            color: var(--accent);
            font-size: 2rem;
            margin-bottom: 0.5em;
        }
        .subtitle {
            text-align: center;
            color: var(--muted);
            margin-bottom: 2em;
            font-size: 0.95em;
        }
        .info-box {
            background: rgba(16, 163, 127, 0.1);
            border-left: 4px solid var(--accent);
            padding: 14px;
            border-radius: 6px;
            margin-bottom: 24px;
            font-size: 0.9em;
            text-align: center;
        }
        .error {
            background: rgba(255, 121, 121, 0.2);
            border-left: 4px solid var(--danger);
            color: var(--danger);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--light);
        }
        input[type=text] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #171717;
            color: var(--light);
            font-size: 1.2em;
            text-align: center;
            letter-spacing: 4px;
            font-family: monospace;
            transition: border-color 0.22s;
        }
        input[type=text]:focus {
            outline: none;
            border-color: var(--accent);
        }
        input[type=submit] {
            width: 100%;
            background: var(--accent);
            color: var(--light);
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1em;
            transition: background 0.22s;
            margin-top: 10px;
        }
        input[type=submit]:hover {
            background: #0d8658;
        }
    </style>
    <script src="/static/security.js"></script>
</head>
<body>
    <div class="box">
        <h2>🔒 Verify Password Change</h2>
        <p class="subtitle">Check your email for the code</p>
        
        <div class="info-box">
            ℹ️ A 6-digit verification code has been sent to your registered email address.
        </div>
        
        {% if error %}
        <div class="error">
            {% if error == "invalid_otp" %}
                ❌ Invalid or expired verification code.
            {% else %}
                ❌ {{ error }}
            {% endif %}
        </div>
        {% endif %}
        
        <form method="post" action="/profile/verify-password-change">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="new_password_hash" value="{{ new_password_hash }}">
            
            <div class="form-group">
                <label for="otp_code">Verification Code</label>
                <input type="text" id="otp_code" name="otp_code" 
                       pattern="[0-9]{6}" 
                       maxlength="6"
                       placeholder="000000" 
                       required autofocus>
            </div>
            
            <input type="submit" value="Verify & Change Password">
        </form>
    </div>
</body>
</html>
