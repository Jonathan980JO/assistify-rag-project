<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <meta name="csrf-token" content="{{ csrf_token() }}">
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Ticket Management - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            color: #6c757d;
            text-transform: uppercase;
        }

        .stat-card.critical {
            border: 3px solid #dc3545;
        }

        .stat-card.critical .stat-value {
            color: #dc3545;
        }

        .content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 15px;
            color: #6c757d;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .filter-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        .tickets-list {
            margin-top: 20px;
        }

        .ticket-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ticket-card:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .ticket-card.escalated {
            border-left: 5px solid #dc3545;
            background: #fff5f5;
        }

        .ticket-card.unassigned {
            border-left: 5px solid #ffc107;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .ticket-number {
            font-weight: bold;
            color: #667eea;
            font-size: 16px;
        }

        .ticket-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-open {
            background: #fff3cd;
            color: #856404;
        }

        .status-assigned {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-resolved {
            background: #d4edda;
            color: #155724;
        }

        .priority-high {
            background: #f8d7da;
            color: #721c24;
        }

        .priority-normal {
            background: #d4edda;
            color: #155724;
        }

        .badge-escalated {
            background: #dc3545;
            color: white;
        }

        .ticket-subject {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .ticket-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #6c757d;
            flex-wrap: wrap;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 30px auto;
            padding: 30px;
            border-radius: 15px;
            max-width: 1000px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
        }

        .modal-title {
            font-size: 24px;
            color: #667eea;
        }

        .close {
            font-size: 28px;
            cursor: pointer;
            color: #6c757d;
            transition: color 0.3s;
        }

        .close:hover {
            color: #dc3545;
        }

        .ticket-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            flex-wrap: wrap;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .messages-container {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .message {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .message.internal {
            background: #fff3cd;
            border-left-color: #ffc107;
        }

        .message-header {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .message-text {
            color: #333;
            line-height: 1.6;
        }

        .message-time {
            font-size: 12px;
            color: #6c757d;
            margin-top: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
    </style>
    <script src="/static/security.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎫 Support Ticket Management (Admin)</h1>
            <a href="/admin" class="btn btn-secondary">← Back to Dashboard</a>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading statistics...</p>
            </div>
        </div>

        <div class="content">
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="filterTickets('all')">All Tickets</button>
                <button class="filter-tab" onclick="filterTickets('escalated')">🚨 Escalated</button>
                <button class="filter-tab" onclick="filterTickets('high')">High Priority</button>
                <button class="filter-tab" onclick="filterTickets('unassigned')">Unassigned</button>
                <button class="filter-tab" onclick="filterTickets('open')">Open</button>
                <button class="filter-tab" onclick="filterTickets('resolved')">Resolved</button>
            </div>

            <div id="ticketsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading tickets...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- View/Manage Ticket Modal -->
    <div id="ticketModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTicketNumber"></h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="ticketActions" class="ticket-actions"></div>
            <div id="ticketDetails"></div>
            <div class="messages-container" id="messagesContainer"></div>
            <form id="addMessageForm" style="margin-top: 20px;">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="newMessage">Add a Message</label>
                    <textarea id="newMessage" name="newMessage" placeholder="Type your message here..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 15px;">Send Message</button>
            </form>
        </div>
    </div>

    <!-- Resolve Modal -->
    <div id="resolveModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2 class="modal-title">Resolve Ticket</h2>
                <span class="close" onclick="closeResolveModal()">&times;</span>
            </div>
            <form id="resolveForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="resolutionNotes">Resolution Notes *</label>
                    <textarea id="resolutionNotes" name="resolutionNotes" required placeholder="Describe how the issue was resolved..."></textarea>
                </div>
                <button type="submit" class="btn btn-success" style="width: 100%;">Mark as Resolved</button>
            </form>
        </div>
    </div>

    <script>
        let allTickets = [];
        let currentTicketId = null;
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadTickets();
            // Refresh every 30 seconds
            setInterval(() => {
                loadStats();
                loadTickets();
            }, 30000);
        });

        async function loadStats() {
            try {
                const response = await fetch('/api/admin/support/summary');
                const stats = await response.json();
                
                const grid = document.getElementById('statsGrid');
                const escalatedClass = stats.escalated_tickets > 0 ? 'critical' : '';
                const unassignedClass = stats.negative_feedback_unaddressed > 0 ? 'critical' : '';
                
                Security.safeSetHTML(grid, `
                    <div class="stat-card">
                        <div class="stat-value">${stats.total_tickets || 0}</div>
                        <div class="stat-label">Total Tickets</div>
                    </div>
                    <div class="stat-card ${escalatedClass}">
                        <div class="stat-value">${stats.escalated_tickets || 0}</div>
                        <div class="stat-label">🚨 Escalated</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.open_tickets || 0}</div>
                        <div class="stat-label">Open Tickets</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.resolved_today || 0}</div>
                        <div class="stat-label">Resolved Today</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.by_priority?.high || 0}</div>
                        <div class="stat-label">High Priority</div>
                    </div>
                    <div class="stat-card ${unassignedClass}">
                        <div class="stat-value">${stats.negative_feedback_unaddressed || 0}</div>
                        <div class="stat-label">Negative Feedback</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadTickets() {
            try {
                const response = await fetch('/api/support/tickets');
                const data = await response.json();
                allTickets = data.tickets || [];
                displayTickets();
            } catch (error) {
                console.error('Error loading tickets:', error);
                Security.safeSetHTML('ticketsContainer', '<p style="color: red;">Error loading tickets. Please refresh the page.</p>';
            }
        }

        function filterTickets(filter) {
            currentFilter = filter;
            
            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            displayTickets();
        }

        function displayTickets() {
            const container = document.getElementById('ticketsContainer');
            
            let filtered = allTickets;
            
            switch(currentFilter) {
                case 'escalated':
                    filtered = allTickets.filter(t => t.escalated_to_admin && t.status !== 'resolved');
                    break;
                case 'high':
                    filtered = allTickets.filter(t => t.priority === 'high' && t.status !== 'resolved');
                    break;
                case 'unassigned':
                    filtered = allTickets.filter(t => !t.assigned_to);
                    break;
                case 'open':
                    filtered = allTickets.filter(t => t.status === 'open');
                    break;
                case 'resolved':
                    filtered = allTickets.filter(t => t.status === 'resolved');
                    break;
            }
            
            // Sort: escalated first, then by creation date
            filtered.sort((a, b) => {
                if (a.escalated_to_admin && !b.escalated_to_admin) return -1;
                if (!a.escalated_to_admin && b.escalated_to_admin) return 1;
                return new Date(b.created_at) - new Date(a.created_at);
            });
            
            if (filtered.length === 0) {
                Security.safeSetHTML(container, `
                    <div class="empty-state">
                        <div style="font-size: 64px; opacity: 0.3;">📭</div>
                        <h3>No Tickets Found</h3>
                        <p>No tickets match the current filter.</p>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="tickets-list">';
            filtered.forEach(ticket => {
                const statusClass = `status-${ticket.status}`;
                const priorityClass = `priority-${ticket.priority}`;
                const createdDate = new Date(ticket.created_at).toLocaleDateString();
                const cardClasses = [];
                
                if (ticket.escalated_to_admin) cardClasses.push('escalated');
                else if (!ticket.assigned_to) cardClasses.push('unassigned');
                
                html += `
                    <div class="ticket-card ${cardClasses.join(' ')}" onclick="viewTicket(${ticket.id})">
                        <div class="ticket-header">
                            <span class="ticket-number">${ticket.ticket_number}</span>
                            <div class="ticket-badges">
                                ${ticket.escalated_to_admin ? '<span class="badge badge-escalated">🚨 ESCALATED</span>' : ''}
                                <span class="badge ${statusClass}">${ticket.status}</span>
                                <span class="badge ${priorityClass}">${ticket.priority}</span>
                            </div>
                        </div>
                        <div class="ticket-subject">${ticket.subject}</div>
                        <div class="ticket-meta">
                            <span>Customer: ${ticket.customer_username}</span>
                            <span>Created: ${createdDate}</span>
                            ${ticket.assigned_to ? `<span>Assigned: ${ticket.assigned_to} (${ticket.assigned_to_role})</span>` : '<span style="color: #ffc107; font-weight: bold;">⚠ Unassigned</span>'}
                        </div>
                    </div>
                `);
            });
            html += '</div>';
            
            Security.safeSetHTML(container, html);
        }

        async function viewTicket(ticketId) {
            currentTicketId = ticketId;
            
            try {
                const response = await fetch(`/api/support/ticket/${ticketId}`);
                const ticket = await response.json();
                
                document.getElementById('modalTicketNumber').textContent = ticket.ticket_number;
                
                // Build action buttons
                let actionsHtml = '';
                if (ticket.status !== 'resolved') {
                    actionsHtml += `<button class="btn btn-success" onclick="openResolveModal()">Resolve Ticket</button>`;
                }
                Security.safeSetHTML(document.getElementById('ticketActions'), actionsHtml);
                
                // Build ticket details
                const statusClass = `status-${ticket.status}`;
                const priorityClass = `priority-${ticket.priority}`;
                
                let detailsHtml = `
                    <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                        ${ticket.escalated_to_admin ? '<div style="background: #f8d7da; padding: 10px; border-left: 4px solid #dc3545; margin-bottom: 15px; border-radius: 5px;"><strong>🚨 This ticket has been escalated to admin level</strong></div>' : ''}
                        <h3 style="margin-bottom: 15px;">${ticket.subject}</h3>
                        <p style="margin-bottom: 15px; line-height: 1.6;">${ticket.description}</p>
                        <div style="display: flex; gap: 20px; font-size: 14px; flex-wrap: wrap;">
                            <span><strong>Customer:</strong> ${ticket.customer_username}</span>
                            <span><strong>Status:</strong> <span class="badge ${statusClass}">${ticket.status}</span></span>
                            <span><strong>Priority:</strong> <span class="badge ${priorityClass}">${ticket.priority}</span></span>
                            ${ticket.assigned_to ? `<span><strong>Assigned:</strong> ${ticket.assigned_to} (${ticket.assigned_to_role})</span>` : '<span style="color: #ffc107;"><strong>⚠ Unassigned</strong></span>'}
                        </div>
                        ${ticket.resolution_notes ? `
                            <div style="margin-top: 15px; padding: 15px; background: #d4edda; border-left: 4px solid #28a745; border-radius: 5px;">
                                <strong>Resolution:</strong><br>${ticket.resolution_notes}
                            </div>
                        ` : ''}
                    </div>
                `;
                
                Security.safeSetHTML(document.getElementById('ticketDetails'), detailsHtml);
                
                // Build messages (admins see all messages including internal notes)
                let messagesHtml = '<h3 style="margin-bottom: 15px;">Complete Conversation (Including Internal Notes)</h3>';
                if (ticket.messages && ticket.messages.length > 0) {
                    ticket.messages.forEach(msg => {
                        const msgDate = new Date(msg.created_at).toLocaleString();
                        const internalClass = msg.is_internal_note ? 'internal' : '';
                        const internalBadge = msg.is_internal_note ? '<span class="badge" style="background: #ffc107; color: #856404;">Internal Note</span>' : '';
                        
                        messagesHtml += `
                            <div class="message ${internalClass}">
                                <div class="message-header">
                                    <span>${msg.sender_username} (${msg.sender_role})</span>
                                    ${internalBadge}
                                </div>
                                <div class="message-text">${msg.message}</div>
                                <div class="message-time">${msgDate}</div>
                            </div>
                        `;
                    });
                } else {
                    messagesHtml += '<p style="color: #6c757d; font-style: italic;">No messages yet.</p>';
                }
                
                Security.safeSetHTML(document.getElementById('messagesContainer'), messagesHtml);
                
                // Show/hide message form
                const form = document.getElementById('addMessageForm');
                if (ticket.status === 'resolved') {
                    form.style.display = 'none';
                } else {
                    form.style.display = 'block';
                }
                
                document.getElementById('ticketModal').style.display = 'block';
            } catch (error) {
                console.error('Error loading ticket:', error);
                alert('Error loading ticket details.');
            }
        }

        function openResolveModal() {
            document.getElementById('resolveModal').style.display = 'block';
        }

        function closeResolveModal() {
            document.getElementById('resolveModal').style.display = 'none';
            document.getElementById('resolveForm').reset();
        }

        function closeModal() {
            document.getElementById('ticketModal').style.display = 'none';
            currentTicketId = null;
        }

        document.getElementById('addMessageForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const message = document.getElementById('newMessage').value;
            
            if (!message.trim()) return;
            
            try {
                const response = await fetch(`/api/support/ticket/${currentTicketId}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message,
                        is_internal_note: false
                    })
                });
                
                if (response.ok) {
                    document.getElementById('newMessage').value = '';
                    viewTicket(currentTicketId);
                } else {
                    alert('Error sending message.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error sending message.');
            }
        });

        document.getElementById('resolveForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const notes = document.getElementById('resolutionNotes').value;
            
            try {
                const response = await fetch(`/api/support/ticket/${currentTicketId}/resolve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resolution_notes: notes })
                });
                
                if (response.ok) {
                    alert('Ticket marked as resolved!');
                    closeResolveModal();
                    closeModal();
                    loadStats();
                    loadTickets();
                } else {
                    alert('Error resolving ticket.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error resolving ticket.');
            }
        });

        // Close modals when clicking outside
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
