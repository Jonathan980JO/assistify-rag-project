<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>User Management - Assistify Admin</title>
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root {
            --accent: #10a37f;
            --bg: #232323;
            --sidebar: #2b2b2b;
            --light: #fff;
            --muted: #9ca3af;
            --danger: #ff7979;
            --warning: #f59e0b;
        }
        body {
            background: var(--bg);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--light);
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1200px;
            margin: 32px auto;
            background: var(--sidebar);
            border-radius: 16px;
            box-shadow: 0 0 24px #111;
            padding: 32px;
        }
        h1 {
            color: var(--accent);
            font-size: 2.2rem;
            margin-bottom: 0.5em;
        }
        h2 {
            margin-top: 1.5em;
            color: var(--accent);
            font-size: 1.5em;
        }
        /* Header and Menu Styles */
        header {
            background: var(--sidebar);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 998;
        }
        .menu-btn {
            background: var(--accent);
            color: var(--light);
            border: none;
            font-size: 24px;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .menu-btn:hover {
            background: #0e8c6d;
        }
        .header-title {
            font-size: 1.5rem;
            margin: 0;
            color: var(--accent);
        }
        .header-spacer {
            width: 72px;
        }
        .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
            z-index: 999;
        }
        .nav-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .nav-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--sidebar);
            box-shadow: 2px 0 16px rgba(0,0,0,0.5);
            transition: left 0.3s;
            z-index: 1000;
            overflow-y: auto;
        }
        .nav-menu.open {
            left: 0;
        }
        .nav-header {
            padding: 24px;
            border-bottom: 1px solid #3a3a3a;
        }
        .nav-header h2 {
            margin: 0;
            color: var(--accent);
            font-size: 1.5rem;
        }
        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .nav-links li {
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-link {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            color: var(--light);
            text-decoration: none;
            transition: background 0.3s;
        }
        .nav-link:hover {
            background: rgba(16,163,127,0.2);
        }
        .nav-link svg {
            width: 20px;
            height: 20px;
            margin-right: 12px;
        }
        .form-container {
            background: #202020;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 32px;
        }
        .form-row {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: var(--light);
            font-weight: 600;
        }
        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            max-width: 400px;
            background: #171717;
            color: var(--light);
            border-radius: 6px;
            border: 1px solid #333;
            padding: 10px;
            font-size: 1em;
        }
        button {
            background: var(--accent);
            color: var(--light);
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.22s;
            margin-top: 10px;
        }
        button:hover {
            background: #0d8658;
        }
        button.danger {
            background: var(--danger);
        }
        button.danger:hover {
            background: #e55454;
        }
        button.warning {
            background: var(--warning);
        }
        button.warning:hover {
            background: #d97706;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        thead {
            background: #171717;
        }
        th {
            padding: 12px;
            text-align: left;
            color: var(--accent);
            font-weight: 700;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        tbody tr:hover {
            background: #202020;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .badge-admin {
            background: var(--accent);
            color: var(--light);
        }
        .badge-customer {
            background: #3b82f6;
            color: var(--light);
        }
        .badge-employee {
            background: var(--warning);
            color: var(--light);
        }
        .badge-inactive {
            background: var(--danger);
            color: var(--light);
        }
        .badge-active {
            background: #10b981;
            color: var(--light);
        }
        .action-btns button {
            padding: 6px 12px;
            font-size: 0.9em;
            margin-right: 8px;
        }
    </style>
    <script src="/static/security.js"></script>
    <script>
        function openNav() {
            document.querySelector('.nav-menu').classList.add('open');
            document.querySelector('.nav-overlay').classList.add('show');
        }
        
        function closeNav() {
            document.querySelector('.nav-menu').classList.remove('open');
            document.querySelector('.nav-overlay').classList.remove('show');
        }
    </script>
</head>
<body>
    <!-- Navigation Overlay -->
    <div class="nav-overlay" onclick="closeNav()"></div>
    
    <!-- Side Navigation Menu -->
    <nav class="nav-menu">
        <div class="nav-header">
            <h2>Menu</h2>
        </div>
        <ul class="nav-links">
            <li>
                <a href="/admin" class="nav-link">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
                    Dashboard
                </a>
            </li>
            <li>
                <a href="/admin/users" class="nav-link">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
                    Users
                </a>
            </li>
            <li>
                <a href="/admin/knowledge" class="nav-link">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/></svg>
                    Knowledge Base
                </a>
            </li>
            <li>
                <a href="/admin/analytics" class="nav-link">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
                    Analytics
                </a>
            </li>
            <li>
                <a href="/admin/audit-logs" class="nav-link">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
                    Audit Logs
                </a>
            </li>
            <li>
                <a href="/profile" class="nav-link">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
                    Profile Settings
                </a>
            </li>
            <li>
                <a href="/frontend/index.html" class="nav-link">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/></svg>
                    Chat
                </a>
            </li>
            <li>
                <a href="/logout" class="nav-link">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
                    Logout
                </a>
            </li>
        </ul>
    </nav>

    <!-- Header with hamburger button -->
    <header>
        <button class="menu-btn" onclick="openNav()">☰</button>
        <h1 class="header-title">Assistify Admin</h1>
        <div class="header-spacer"></div>
    </header>

    <div class="container">
        <h1>👥 User Management</h1>
        
        <h2>Create New User</h2>
        <div class="form-container">
            <form id="createUserForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-row">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-row">
                    <label for="password">Password (min. 8 characters)</label>
                    <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
                </div>
                <div class="form-row">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" autocomplete="new-password">
                </div>
                <div class="form-row">
                    <label for="role">Role</label>
                    <select id="role" name="role" required>
                        <option value="customer">Customer</option>
                        <option value="employee">Employee</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit">Create User</button>
            </form>
        </div>
        
        <h2>Existing Users</h2>
        <table id="usersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersBody">
                <tr><td colspan="5" style="text-align: center;">Loading users...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        function getCookie(name) {
            const v = `; ${document.cookie}`;
            const parts = v.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        const csrf = getCookie('csrf_token');

        // Load users on page load
        async function loadUsers() {
            try {
                const response = await fetch('/api/users', {
                    credentials: 'same-origin',
                    headers: { 'x-csrf-token': csrf }
                });
                const users = await response.json();
                
                const tbody = document.getElementById('usersBody');
                tbody.innerHTML = ''; // Clear existing content
                
                if (users.length === 0) {
                    const row = tbody.insertRow();
                    const cell = row.insertCell();
                    cell.colSpan = 5;
                    cell.style.textAlign = 'center';
                    cell.textContent = 'No users found';
                    return;
                }
                
                // Create rows using DOM methods
                users.forEach(user => {
                    const row = tbody.insertRow();
                    
                    // ID cell
                    const idCell = row.insertCell();
                    idCell.textContent = user.id;
                    
                    // Username cell
                    const usernameCell = row.insertCell();
                    usernameCell.textContent = user.username;
                    
                    // Role cell
                    const roleCell = row.insertCell();
                    const roleBadge = document.createElement('span');
                    roleBadge.className = `badge badge-${user.role}`;
                    roleBadge.textContent = user.role.toUpperCase();
                    roleCell.appendChild(roleBadge);
                    
                    const changeRoleBtn = document.createElement('button');
                    changeRoleBtn.style.marginLeft = '8px';
                    changeRoleBtn.style.padding = '4px 8px';
                    changeRoleBtn.style.fontSize = '0.8em';
                    changeRoleBtn.textContent = 'Change';
                    changeRoleBtn.onclick = () => changeRole(user.id, user.username, user.role);
                    roleCell.appendChild(changeRoleBtn);
                    
                    // Status cell
                    const statusCell = row.insertCell();
                    const statusBadge = document.createElement('span');
                    statusBadge.className = `badge badge-${user.active ? 'active' : 'inactive'}`;
                    statusBadge.textContent = user.active ? 'Active' : 'Inactive';
                    statusCell.appendChild(statusBadge);
                    
                    // Actions cell
                    const actionsCell = row.insertCell();
                    actionsCell.className = 'action-btns';
                    
                    // Edit Profile button
                    const editBtn = document.createElement('button');
                    editBtn.textContent = 'Edit Profile';
                    editBtn.onclick = () => editUserProfile(user.id, user.username, user.email || '', user.full_name || '');
                    actionsCell.appendChild(editBtn);
                    
                    // Activate/Deactivate button
                    const toggleBtn = document.createElement('button');
                    toggleBtn.className = 'warning';
                    if (user.active) {
                        toggleBtn.textContent = 'Deactivate';
                        toggleBtn.onclick = () => deactivateUser(user.id, user.username);
                    } else {
                        toggleBtn.textContent = 'Activate';
                        toggleBtn.onclick = () => activateUser(user.id, user.username);
                    }
                    actionsCell.appendChild(toggleBtn);
                    
                    // Delete button
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'danger';
                    deleteBtn.textContent = 'Delete';
                    deleteBtn.onclick = () => deleteUser(user.id, user.username);
                    actionsCell.appendChild(deleteBtn);
                });
            } catch (error) {
                console.error('Error loading users:', error);
                const tbody = document.getElementById('usersBody');
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #ff7979;">Error loading users</td></tr>';
            }
        }

        // Create user
        document.getElementById('createUserForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate password match
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            const formData = {
                username: document.getElementById('username').value,
                password: password,
                role: document.getElementById('role').value
            };
            
            try {
                const response = await fetch('/api/users/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-csrf-token': csrf
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert('User created successfully!');
                    document.getElementById('createUserForm').reset();
                    loadUsers();
                } else {
                    alert('Error: ' + (result.detail || 'Failed to create user'));
                }
            } catch (error) {
                alert('Error creating user: ' + error.message);
            }
        };

        // Deactivate user
        async function deactivateUser(userId, username) {
            if (!confirm(`Deactivate user "${username}"?`)) return;
            
            try {
                const response = await fetch(`/api/users/${userId}/deactivate`, {
                    method: 'POST',
                    headers: { 'x-csrf-token': csrf },
                    credentials: 'same-origin'
                });
                
                if (response.ok) {
                    alert('User deactivated');
                    loadUsers();
                } else {
                    alert('Failed to deactivate user');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Activate user
        async function activateUser(userId, username) {
            if (!confirm(`Activate user "${username}"?`)) return;
            
            try {
                const response = await fetch(`/api/users/${userId}/activate`, {
                    method: 'POST',
                    headers: { 'x-csrf-token': csrf },
                    credentials: 'same-origin'
                });
                
                if (response.ok) {
                    alert('User activated');
                    loadUsers();
                } else {
                    alert('Failed to activate user');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Delete user
        async function deleteUser(userId, username) {
            if (!confirm(`PERMANENTLY DELETE user "${username}"? This cannot be undone!`)) return;
            
            try {
                const response = await fetch(`/api/users/${userId}/delete`, {
                    method: 'DELETE',
                    headers: { 'x-csrf-token': csrf },
                    credentials: 'same-origin'
                });
                
                if (response.ok) {
                    alert('User deleted');
                    loadUsers();
                } else {
                    alert('Failed to delete user');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Edit user profile
        async function editUserProfile(userId, username, email, fullName) {
            const newEmail = prompt(`Edit email for "${username}":`, email || '');
            if (newEmail === null) return; // Cancelled
            
            const newFullName = prompt(`Edit full name for "${username}":`, fullName || '');
            if (newFullName === null) return; // Cancelled
            
            // Only update if something changed
            if (newEmail === (email || '') && newFullName === (fullName || '')) {
                alert('No changes made');
                return;
            }
            
            try {
                const response = await fetch(`/api/users/${userId}/update-profile`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-csrf-token': csrf
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({ 
                        email: newEmail,
                        full_name: newFullName
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert(`Profile updated successfully for "${username}"!`);
                    loadUsers();
                } else {
                    alert('Error: ' + (result.detail || 'Failed to update profile'));
                }
            } catch (error) {
                alert('Error updating profile: ' + error.message);
            }
        }

        // Change user role
        async function changeRole(userId, username, currentRole) {
            const roles = ['customer', 'employee', 'admin'];
            const roleOptions = roles.map(r => 
                `<option value="${r}" ${r === currentRole ? 'selected' : ''}>${r.toUpperCase()}</option>`
            ).join('');
            
            const newRole = prompt(
                `Change role for "${username}"\\n\\nCurrent role: ${currentRole.toUpperCase()}\\n\\nEnter new role (customer, employee, or admin):`,
                currentRole
            );
            
            if (!newRole || newRole === currentRole) return;
            
            if (!roles.includes(newRole.toLowerCase())) {
                alert('Invalid role! Must be: customer, employee, or admin');
                return;
            }
            
            try {
                const response = await fetch(`/api/users/${userId}/change-role`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-csrf-token': csrf
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({ role: newRole.toLowerCase() })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert(`Role changed successfully!\\n\\n${username}: ${currentRole.toUpperCase()} → ${newRole.toUpperCase()}\\n\\nNote: User will need to log in again for the new role to take effect.`);
                    loadUsers();
                } else {
                    alert('Error: ' + (result.detail || 'Failed to change role'));
                }
            } catch (error) {
                alert('Error changing role: ' + error.message);
            }
        }

        // Load users on page load
        loadUsers();
    </script>
</body>
</html>
