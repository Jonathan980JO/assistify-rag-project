name: assistify_main
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # PyTorch with CUDA 12.1 (RTX 3070 compatible, driver >= 525)
  - pytorch::pytorch=2.2.*
  - pytorch::torchvision=0.17.*
  - pytorch::torchaudio=2.2.*
  - pytorch::pytorch-cuda=12.1

  - pip:
    # FastAPI / server
    - fastapi==0.115.12
    - psutil>=5.0.0
    - uvicorn[standard]==0.34.2
    - websockets==14.2
    - python-multipart==0.0.20
    - aiofiles==24.1.0
    - aiohttp==3.11.18

    # Authentication / security
    - passlib[bcrypt]==1.7.4
    - python-jose[cryptography]==3.3.0
    - bcrypt==4.0.1
    - pyotp==2.9.0

    # Pydantic
    - pydantic==2.10.6

    # NLP / embeddings (for RAG)
    - sentence-transformers==3.4.1
    - transformers==4.49.0
    - tokenizers==0.21.1
    - huggingface-hub==0.29.3

    # Vector DB
    - chromadb==0.6.3

    # PDF extraction
    - PyPDF2==3.0.1

    # Speech-to-text (ctranslate2 backend, no heavy torch dependency)
    - faster-whisper==1.1.1
    - ctranslate2==4.5.0

    # HTTP / utilities
    - httpx==0.28.1
    - requests==2.32.3
    - requests-oauthlib==2.0.0

    # Database
    - sqlalchemy==2.0.38
    - pysqlite3-binary>=0.5.0

    # Audio
    - soundfile==0.12.1
    - scipy==1.15.2
    - numpy==1.26.4

    # Misc
    - python-dotenv==1.0.1
    - onnxruntime==1.21.0

    # TTS (Piper microservice on port 5002)
    # Use a version with prebuilt Windows wheels (bundles the compiled
    # espeakbridge extension); 1.4.0 ships sdist-only and breaks synthesis.
    - piper-tts==1.4.2
