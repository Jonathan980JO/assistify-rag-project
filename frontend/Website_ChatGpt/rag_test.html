<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Assistify RAG Manual Test Interface</title>
<style>
    :root {
      --bg-dark: #1e1e1e;
      --bg-sidebar: #2b2b2b;
      --text-light: #ffffff;
      --text-muted: #9ca3af;
      --accent: #10a37f;
      --user-bubble: #10a37f;
      --ai-bubble: #40414f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      display: flex;
      height: 100vh;
      overflow: hidden;
      flex-direction: column;
      align-items: center;
      justify-content: start;
      padding: 2rem;
    }

    h1 {
      margin-bottom: 1rem;
      font-weight: 600;
      font-size: 1.6rem;
      color: var(--accent);
    }

    form {
      width: 100%;
      max-width: 700px;
      margin-bottom: 2rem;
    }

    label {
      font-weight: 600;
      font-size: 1rem;
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
    }

    textarea, input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-sidebar);
      border: 1px solid #444;
      border-radius: 12px;
      font-size: 1rem;
      color: var(--text-light);
      resize: vertical;
      min-height: 60px;
      max-height: 150px;
      outline: none;
      font-family: inherit;
    }

    textarea:focus, input[type="text"]:focus {
      border-color: var(--accent);
    }

    button {
      margin-top: 1rem;
      padding: 12px 20px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: background-color 0.3s ease;
    }

    button:hover:not(:disabled) {
      background: #0e8e6c;
    }

    button:disabled {
      background: #666;
      cursor: not-allowed;
    }

    #response, #uploadStatus {
      max-width: 700px;
      width: 100%;
      padding: 16px;
      background: var(--bg-sidebar);
      border-radius: 12px;
      color: var(--text-light);
      min-height: 80px;
      margin-top: 0.5rem;
      white-space: pre-wrap;
    }
</style>
</head>
<body>

<h1>Assistify RAG Manual Test Interface</h1>

<form id="queryForm">
  <label for="queryText">Enter your query:</label>
  <textarea id="queryText" rows="4" placeholder="Type your question here..."></textarea>
  <button type="submit">Send Query</button>
</form>

<div id="response" aria-live="polite" aria-atomic="true"></div>

<form id="uploadForm" enctype="multipart/form-data">
  <label for="fileUpload">Upload Knowledge Base Document (.pdf, .txt):</label>
  <input type="file" id="fileUpload" accept=".pdf,.txt" required />
  <button type="submit">Upload File</button>
</form>

<div id="uploadStatus"></div>

<script>
  const queryForm = document.getElementById('queryForm');
  const responseDiv = document.getElementById('response');
  const uploadForm = document.getElementById('uploadForm');
  const uploadStatus = document.getElementById('uploadStatus');

  queryForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = document.getElementById('queryText').value.trim();
    if (!text) {
      alert("Please enter a query.");
      return;
    }

    responseDiv.textContent = "Processing your query...";
    try {
      const res = await fetch("http://localhost:7000/query", { // Replace with your backend query endpoint
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ "text": text })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      responseDiv.textContent = data.answer || "No answer received.";
    } catch (error) {
      responseDiv.textContent = "Error: " + error;
    }
  });

  uploadForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fileInput = document.getElementById("fileUpload");
    if (fileInput.files.length === 0) {
      alert("Select a file to upload.");
      return;
    }
    uploadStatus.textContent = "Uploading file...";
    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
      const res = await fetch("http://localhost:7000/upload_rag", { // Replace with your upload endpoint
        method: "POST",
        body: formData
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const result = await res.json();
      uploadStatus.textContent = result.message || "Upload successful.";
    } catch (error) {
      uploadStatus.textContent = "Upload failed: " + error;
    }
  });
</script>

</body>
</html>
